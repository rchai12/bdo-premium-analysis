networks:
  proxy_net:
    external: true

volumes:
  bdo-pgdata:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bdo_market
      POSTGRES_USER: bdo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - bdo-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bdo -d bdo_market"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - default
      - proxy_net
    depends_on:
      - bdo-api
    restart: unless-stopped

  bdo-api:
    build:
      context: ../api
      dockerfile: Dockerfile
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
